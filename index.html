<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://headless-checkout-demo-react.web.app/start-page" />
    <meta property="og:title" content="Headless Checkout demo" />
    <meta
      property="og:description"
      content="Get maximum control over the payment flow and customize the layout, fields, and styles to match your game or store design"
    />
    <meta
      property="og:image"
      content="https://headless-checkout-demo-react.web.app/images/og-image.jpg"
    />
    <!-- Note: og:image must be absolute URL, not affected by base -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Xsolla" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://headless-checkout-demo-react.web.app/start-page" />
    <meta name="twitter:title" content="Headless Checkout demo" />
    <meta
      name="twitter:description"
      content="Get maximum control over the payment flow and customize the layout, fields, and styles to match your game or store design"
    />
    <meta
      name="twitter:image"
      content="https://headless-checkout-demo-react.web.app/images/og-image.jpg"
    />

    <title>Headless Checkout</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
